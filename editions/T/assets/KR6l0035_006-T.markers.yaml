  - {type: variant, offset: 5282, length: 36, content: '是第二節也。此以從身見遍行因生，及作＝他【甲】【乙】作【大】，他【甲】【乙】作他遍行因生此身見故除也。得非遍行因，故不言＝無【甲】【乙】不言【大】，無【甲】【乙】不言無

      等也', 甲: 此即第二節也此以從身見遍行因生及作遍行因生此身見故除也得非遍行因故不言等也, 乙: 此即第二節也此以從身見遍行因生及作遍行因生此身見故除也得非遍行因故不言等也}
