  - {type: variant, offset: 1908, length: 60, content: 取果唯現，過去已取、未來未取。已取果已屬已，未取果未屬已，果據所取故唯有二。謂若俱、若在後，因唯無障，不據能〔取〕－【甲】【乙】取【大】，〔－〕【甲】【乙】取，故許通三，謂若俱、若在前、若在後也, 甲: 取果唯現過去已取未來未取已取果已屬已未取果未屬已果據所取故唯有二謂若俱若在後因唯無障不據能取故許通三謂若俱若在前若在後也, 乙: 取果唯現過去已取未來未取已取果已屬已未取果未屬已果據所取故唯有二謂若俱若在後因唯無障不據能取故許通三謂若俱若在前若在後也}
