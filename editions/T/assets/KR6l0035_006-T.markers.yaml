  - {type: variant, offset: 5224, length: 37, content: 等言謂得。此從身見有同類、遍行因生，作＝依【甲】【乙】作【大】，依【甲】【乙】作依同類因生身見也。身見相應、俱有法，加＝如【甲】【乙】加【大】，如【甲】【乙】加如相應、俱有因也, 甲: 等言謂得此從身見有同類遍行因生作同類因生身見也身見相應俱有法加相應俱有因也, 乙: 等言謂得此從身見有同類遍行因生作同類因生身見也身見相應俱有法加相應俱有因也}
