  - {type: variant, offset: 5387, length: 51, content: 第四節除法也。此舉〔身〕－【甲】【乙】身【大】，〔－〕【甲】【乙】身見及相應法，取生、老、住、無常，以（作）＋俱【甲】【乙】俱【大】，作俱【甲】【乙】俱作俱有因生身見，故（即）＋除【甲】【乙】除【大】，即除【甲】【乙】除即除也。諸餘染污〔苦諦〕－【甲】【乙】苦諦【大】，〔－〕【甲】【乙】苦諦，即是從身見生，不與身見為因苦諦也, 甲: 第四節除法也此舉身見及相應法取生老住無常以俱有因生身見故除也諸餘染污苦諦即是從身見生不與身見為因苦諦也, 乙: 第四節除法也此舉身見及相應法取生老住無常以俱有因生身見故除也諸餘染污苦諦即是從身見生不與身見為因苦諦也}
