  - {type: variant, offset: 5111, length: 61, content: 此中唯有三句別也。無四句者，以身見是遍行因故。能生一切染污法染污法中，無能生身見不從身見生＋（者）【甲】【乙】生【大】，生者【甲】【乙】生生者，不染污法中復＝難【甲】【乙】復【大】，難【甲】【乙】復難無能生身見者。此中據因緣作論故, 甲: 此中唯有三句別也無四句者以身見是遍行因故能生一切染污法染污法中無能生身見不從身見生不染污法中復無能生身見者此中據因緣作論故, 乙: 此中唯有三句別也無四句者以身見是遍行因故能生一切染污法染污法中無能生身見不從身見生不染污法中復無能生身見者此中據因緣作論故}
