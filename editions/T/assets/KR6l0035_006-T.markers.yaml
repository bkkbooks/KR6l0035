  - {type: variant, offset: 5324, length: 1, content: 見, 甲: '', 乙: ''}
  - {type: punctuation, offset: 5329, content: ，, id: KR6l0035_T_006-bkkpn1065}
  - {type: variant, offset: 5329, length: 35, content: 此第三節除也。此舉身見，除相應法、不除身見。此以〔相應法作〕－【甲】【乙】相應法作【大】，〔－〕【甲】【乙】相應法作相應、俱有因生身見，故除也, 甲: 此第三節除也此舉身見除相應法不除身見此以相應法作相應俱有因生身見故除也, 乙: 此第三節除也此舉身見除相應法不除身見此以相應法作相應俱有因生身見故除也}
