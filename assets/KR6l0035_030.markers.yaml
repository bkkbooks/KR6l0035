  - {type: variant, offset: 7519, length: 116, content: '從去秋至此冬，一部始終點功已畢。今窺其體，元草書□，傳寫之間彌成違失，每披其文必迷首尾。肆多勘本文、少加斷推，已及半分變改前緒。雖恐背先賢之深慮，只為勸後學之惠解，尚處處有脫落重復之，可勘正。

      保延三年十二月三日燈下記之。

      前少僧都　覺樹

      （別筆）

      以興福寺慈恩院本一交了。　樹海', 甲: '', 乙: ''}
