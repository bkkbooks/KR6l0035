  - {type: variant, offset: 31730, length: 136, content: '建久二十一十一日於三井寺南，此疏一部卅軸，是東南覺僧都深得對法之□□搜諸師意，讀難讀、訓難訓，而所切句付假名之點本也。誠是一寺規模、萬代寶物也。然當卷本自缺了，爰予悲法命漸盡，不顧鳥跡，所寫加也。雖然寫本文字極狼藉也，少少雖直之，多多謬難盡歟。隨後覽可直之。

      壽永元年十月十二日於石山寺書寫了。　　　　弟子範賢，生年十九歲。', 甲: '', 乙: ''}
